name: Prisma Migrate Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target database environment
        required: true
        type: choice
        options:
          - development
          - production

permissions:
  contents: read

jobs:
  migrate-development:
    if: github.event.inputs.target == 'development'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrate deploy (development)
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: |
          set -euo pipefail
          pnpm exec prisma migrate status
          pnpm exec prisma migrate deploy

  migrate-production:
    if: github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrate deploy (production)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          set -euo pipefail
          pnpm exec prisma migrate status
          pnpm exec prisma migrate deploy
